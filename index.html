<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Caps Sync</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  max-width:700px;
  margin:40px auto;
  padding:20px;
}

textarea{
  width:100%;
  height:170px;
  padding:12px;
  font-size:16px;
  box-sizing:border-box;
}

#output{
  margin-top:10px;
  padding:12px;
  border:1px solid #ccc;
  min-height:90px;
  white-space:pre-wrap;
  background:#f9f9f9;
}

.hidden{display:none;}

button{
  padding:10px 14px;
  font-size:15px;
  margin-right:8px;
  margin-top:10px;
  cursor:pointer;
}

input[type="password"]{
  padding:10px;
  font-size:16px;
  width:220px;
}
</style>
</head>

<body>

<h2>Private Caps Sync</h2>

<div id="loginBox">
  <p>Enter password:</p>
  <input type="password" id="passwordInput">
  <button onclick="checkPassword()">Enter</button>
</div>

<div id="appBox" class="hidden">
  <textarea id="input" placeholder="Type here..."></textarea>

  <div>
    <button onclick="copyText()">Copy</button>
    <button onclick="clearText()">Clear</button>
  </div>

  <div id="output"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, set, onValue }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHspAXnDDvGNMluo5pn3EDl9STD-sOUJY",
  authDomain: "allcaps-f9c51.firebaseapp.com",
  databaseURL: "https://allcaps-f9c51-default-rtdb.firebaseio.com",
  projectId: "allcaps-f9c51",
  storageBucket: "allcaps-f9c51.firebasestorage.app",
  messagingSenderId: "34251463209",
  appId: "1:34251463209:web:0f2a0517daf05972f01a38"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const input = document.getElementById("input");
const output = document.getElementById("output");
const loginBox = document.getElementById("loginBox");
const appBox = document.getElementById("appBox");

let textRef = null;
let currentMode = "";

/* PASSWORD CHECK */
window.checkPassword = function(){

  const pass = document.getElementById("passwordInput").value;

  if(pass === "1102"){
    currentMode = "caps";
    openRoom("room_1102");
  }
  else if(pass === "1504"){
    currentMode = "exact";
    openRoom("room_1504");
  }
  else{
    alert("Wrong password ❌");
  }
};

/* OPEN ROOM */
function openRoom(roomName){

  loginBox.classList.add("hidden");
  appBox.classList.remove("hidden");

  textRef = ref(db, roomName);

  /* LOAD SAVED DATA */
  onValue(textRef, (snapshot)=>{
    const data = snapshot.val() || "";
    input.value = data;
    output.textContent = data;
  });

  /* IMPORTANT: use addEventListener only once */
  input.oninput = null;

  input.oninput = async function(){

    let val = input.value;

    if(currentMode === "caps"){
      val = val.toUpperCase();
      input.value = val;
    }

    output.textContent = val;

    try{
      await set(textRef, val);
    }catch(err){
      console.log(err);
      alert("Save failed");
    }
  };
}

/* COPY */
window.copyText = function(){
  navigator.clipboard.writeText(output.textContent);
  alert("Copied ✅");
};

/* CLEAR */
window.clearText = async function(){

  input.value = "";
  output.textContent = "";

  if(textRef){
    await set(textRef, "");
  }
};
</script>

</body>
</html>
